<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunic Dining</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2e1a08;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.6rem, 9vw, 4.2rem);
      font-weight: 300;
      color: #f5f0e8;
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    h1 em {
      font-style: italic;
      color: #c8922a;
    }

    p {
      font-family: 'Jost', sans-serif;
      font-size: clamp(0.78rem, 2.5vw, 0.9rem);
      font-weight: 300;
      color: rgba(245,240,232,0.45);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .rule span {
      display: block;
      width: 36px;
      height: 1px;
      background: rgba(200,146,42,0.35);
    }
    .rule i {
      color: #c8922a;
      font-style: normal;
      font-size: 0.4rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Something <em>beautiful</em><br>is coming</h1>
    <div class="rule"><span></span><i>◆</i><span></span></div>
    <p>Every thing amazing takes time</p>
  </div>
</body>
</html>
