<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunic Craft Shop · Coming Soon</title>
<meta name="description" content="Yunic Craft Shop — Objects from the journey. Taste the story. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F3EC;
    --teal: #2C4A52;
    --gold: #B4934D;
  }
  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--teal);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }
  .logo-wrap { margin-bottom: 40px; }
  .logo-wrap img {
    height: 80px;
    width: auto;
  }
  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 40px;
    opacity: 0.6;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
  }
  p {
    font-size: clamp(0.85rem, 2vw, 1rem);
    letter-spacing: 0.08em;
    color: var(--teal);
    opacity: 0.7;
    max-width: 420px;
    line-height: 1.8;
    margin: 0 auto;
  }
  .bottom {
    position: fixed;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="images/yunic_logo.png" alt="Yunic">
  </div>
  <div class="divider"></div>
  <h1>Something beautiful<br>is <em>coming soon.</em></h1>
  <p>Objects from the journey. Taste the story.<br>Yunic Craft Shop &amp; Dining — Bali, Indonesia.</p>
  <div class="bottom">© 2025 Yunic · yunicshop.com</div>
</body>
</html>
